name: Weekly Analytics Update

on:
  schedule:
    # Her Pazar 06:00 UTC — haftalık metrikleri güncelle
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'update (metrikleri çek) veya report (sadece yazdır)'
        required: false
        default: 'update'
        type: choice
        options:
          - update
          - report

jobs:
  analytics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Git Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install tweepy requests

      - name: Run Analytics
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="update"; fi
          echo "Running analytics in mode: $MODE"
          python analytics.py "$MODE"

      - name: Commit Analytics Results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tweet_analytics.json || true
          git diff --cached --quiet && echo "No changes" || git commit -m "analytics: update weekly tweet metrics [skip ci]"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin ${{ github.ref_name }} || echo "Push failed — will retry next run"
