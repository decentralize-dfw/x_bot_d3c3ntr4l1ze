name: Decentralize Design Thinking on Automation

on:
  schedule:
    # 1. Artwork drop + thread:      TR 07:00 -> UTC 04:00
    - cron: '0 4 * * *'
    # 2. Reply (normal):             TR 10:00 -> UTC 07:00
    - cron: '0 7 * * *'
    # 3. Reply (normal):             TR 13:00 -> UTC 10:00
    - cron: '0 10 * * *'
    # 4. Manifesto (controversial):  TR 16:00 -> UTC 13:00
    - cron: '0 13 * * *'
    # 5. Reply (controversial):      TR 19:00 -> UTC 16:00
    - cron: '0 16 * * *'
    # 6. Quote tweet (controversial + CTA): TR 22:00 -> UTC 19:00
    - cron: '0 19 * * *'
    # 7. Media archive tweet:        UTC 22:00
    - cron: '0 22 * * *'
  workflow_dispatch: # Manuel çalıştırma butonu her zaman açık

jobs:
  transmit:
    runs-on: ubuntu-latest

    steps:
      - name: Git Checkout
        uses: actions/checkout@v3

      - name: Init Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Determine Mode and Execute
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          HOUR=$(date -u +%H | sed 's/^0//')
          if [ "$HOUR" -eq 4 ]; then
            echo "Mode: artwork"
            python bot.py artwork
          elif [ "$HOUR" -eq 7 ]; then
            echo "Mode: reply (normal)"
            python bot.py reply
          elif [ "$HOUR" -eq 10 ]; then
            echo "Mode: reply (normal)"
            python bot.py reply
          elif [ "$HOUR" -eq 13 ]; then
            echo "Mode: evening_controversial"
            python bot.py evening_controversial
          elif [ "$HOUR" -eq 16 ]; then
            echo "Mode: reply_controversial"
            python bot.py reply_controversial
          elif [ "$HOUR" -eq 19 ]; then
            echo "Mode: quote"
            python bot.py quote
          elif [ "$HOUR" -eq 22 ]; then
            echo "Mode: morning (media archive)"
            python bot.py morning
          else
            echo "Mode: test (evening)"
            python bot.py evening
          fi
