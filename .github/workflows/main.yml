name: Decentralize Design Thinking on Automation

on:
  schedule:
    # TR 10:00 -> UTC 07:00  — Media archive tweet
    - cron: '0 7 * * *'
    # TR 12:00 -> UTC 09:00  — Decrypt.co news tweet
    - cron: '0 9 * * *'
    # TR 14:00 -> UTC 11:00  — Artwork drop
    - cron: '0 11 * * *'
    # TR 16:00 -> UTC 13:00  — VentureBeat news tweet
    - cron: '0 13 * * *'
    # TR 18:00 -> UTC 15:00  — Evening manifesto
    - cron: '0 15 * * *'
    # TR 19:00 -> UTC 16:00  — Controversial manifesto
    - cron: '0 16 * * *'
    # TR 21:00 -> UTC 18:00  — Evening manifesto
    - cron: '0 18 * * *'
    # TR 23:00 -> UTC 20:00  — Controversial manifesto
    - cron: '0 20 * * *'
    # TR 15:00 -> UTC 12:00  — Viral mix (target audience fusion)
    - cron: '0 12 * * *'
    # TR 09:00 -> UTC 06:00 Pazartesi — Community pulse thread
    - cron: '0 6 * * 1'
    # BUG FIX #17: Data viz Perşembe 09:00'dan 10:00'a taşındı
    # TR 13:00 -> UTC 10:00 Perşembe — Data viz tweet (çakışmasız slot)
    - cron: '0 10 * * 4'
    # reply_mode (quote engage) — 4 run/gün × 5 max QT = 20 QT-engage/gün hedefi (Mon-Sat)
    # Saat seçimi: diğer modlar tam saatte → biz yarım saatte (çakışmasız)
    - cron: '30 8 * * 1-6'   # TR 11:30 — sabah run
    - cron: '30 12 * * 1-6'  # TR 15:30 — öğlen run
    - cron: '30 16 * * 1-6'  # TR 19:30 — ikindi run
    - cron: '0 19 * * 1-6'   # TR 22:00 — akşam run
    # Pazar 08:00 UTC — Engagement backfill (AŞAMA 4)
    - cron: '0 8 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Çalıştırılacak mod (boş bırakırsan schedule mantığına göre çalışır)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - decrypt
          - venturebeat
          - evening
          - evening_controversial
          - artwork
          - morning
          - viral_mix
          - community_pulse
          - data_viz
          - quote_tweet
          - reply_mode
          - like_mode
          - retweet_mode
          - like_following
          - following_scan
          - engagement_backfill

jobs:
  transmit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Git Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Init Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Determine Mode and Execute
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          BEARERTOKEN: ${{ secrets.BEARERTOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SCHEDULE: ${{ github.event.schedule }}
          DISPATCH_MODE: ${{ github.event.inputs.mode }}
        run: |
          # Manuel dispatch'te mode input'u varsa onu kullan
          if [ -n "$DISPATCH_MODE" ]; then
            echo "Mode: manual dispatch override → $DISPATCH_MODE"
            if [ "$DISPATCH_MODE" = "engagement_backfill" ]; then
              python engagement_backfill.py
            else
              python bot.py "$DISPATCH_MODE"
            fi
            exit 0
          fi
          echo "Triggered by schedule: '$SCHEDULE'"
          if [ "$SCHEDULE" = "0 7 * * *" ]; then
            echo "Mode: morning (media archive)"
            python bot.py morning
          elif [ "$SCHEDULE" = "0 9 * * *" ]; then
            echo "Mode: decrypt.co news tweet"
            python bot.py decrypt
          elif [ "$SCHEDULE" = "0 11 * * *" ]; then
            echo "Mode: artwork"
            python bot.py artwork
          elif [ "$SCHEDULE" = "0 13 * * *" ]; then
            echo "Mode: venturebeat.com news tweet"
            python bot.py venturebeat
          elif [ "$SCHEDULE" = "0 15 * * *" ]; then
            echo "Mode: evening (manifesto)"
            python bot.py evening
          elif [ "$SCHEDULE" = "0 16 * * *" ]; then
            echo "Mode: evening_controversial"
            python bot.py evening_controversial
          elif [ "$SCHEDULE" = "0 18 * * *" ]; then
            echo "Mode: evening (manifesto)"
            python bot.py evening
          elif [ "$SCHEDULE" = "0 20 * * *" ]; then
            echo "Mode: evening_controversial"
            python bot.py evening_controversial
          elif [ "$SCHEDULE" = "0 12 * * *" ]; then
            echo "Mode: viral_mix (target audience fusion)"
            python bot.py viral_mix
          elif [ "$SCHEDULE" = "0 6 * * 1" ]; then
            echo "Mode: community_pulse (weekly thread)"
            python bot.py community_pulse
          elif [ "$SCHEDULE" = "0 10 * * 4" ]; then
            # BUG FIX #17: '0 9 * * 4' → '0 10 * * 4' — çakışma giderildi
            echo "Mode: data_viz (weekly chart tweet)"
            python bot.py data_viz
          elif [ "$SCHEDULE" = "30 8 * * 1-6" ] || [ "$SCHEDULE" = "30 12 * * 1-6" ] || \
               [ "$SCHEDULE" = "30 16 * * 1-6" ] || [ "$SCHEDULE" = "0 19 * * 1-6" ]; then
            # 4 run/gün × 5 max QT = 20 QT-engage/gün hedefi
            echo "Mode: reply_mode (5 quote-engage/run, Mon-Sat)"
            python bot.py reply_mode
          elif [ "$SCHEDULE" = "0 8 * * 0" ]; then
            echo "Mode: engagement_backfill (AŞAMA 4 — Pazar)"
            python engagement_backfill.py
          else
            # BUG FIX #18: Bilinmeyen schedule veya boş dispatch → sessiz evening yerine uyarı
            echo "WARNING: No matching mode for SCHEDULE='$SCHEDULE' — skipping to prevent unexpected posts."
            exit 0
          fi

      - name: Commit Archive Update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tweet_archive.json
          [ -f analytics_weekly.json ] && git add analytics_weekly.json || true
          git diff --cached --quiet && echo "No archive changes to commit." && exit 0
          git commit -m "archive: update tweet history $(date -u +%Y-%m-%d)"
          git push origin ${{ github.ref_name }} || (
            git pull --rebase origin ${{ github.ref_name }} &&
            git push origin ${{ github.ref_name }}
          )
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
