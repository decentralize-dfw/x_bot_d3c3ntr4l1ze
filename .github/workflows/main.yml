name: Decentralize Design Thinking on Automation

on:
  schedule:
    # 1. Sabah Tweeti: TR 09:00 -> UTC 06:00
    - cron: '0 6 * * *'
    # 2. Akşam Tweeti: TR 18:00 -> UTC 15:00
    - cron: '0 15 * * *'
    # 3. TEST TWEETI: UTC 22:02 (2026-03-01)
    - cron: '2 22 * * *'
  workflow_dispatch: # Manuel çalıştırma butonu her zaman açık

jobs:
  transmit:
    runs-on: ubuntu-latest

    steps:
      - name: Git Checkout
        uses: actions/checkout@v3

      - name: Init Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Execute Script
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python bot.py
