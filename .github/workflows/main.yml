name: Decentralize Design Thinking on Automation

on:
  schedule:
    # 1. Amerika Sabah 10:00 (EST) -> UTC 15:00
    - cron: '0 15 * * *'
    # 2. Amerika Akşam 18:00 (EST) -> UTC 23:00
    - cron: '0 23 * * *'
    # 3. TEST TWEETI: Lüksemburg 21:25 (UTC 20:25)
    - cron: '25 20 * * *'
  workflow_dispatch: # Manuel çalıştırma butonu her zaman açık

jobs:
  transmit:
    runs-on: ubuntu-latest

    steps:
      - name: Git Checkout
        uses: actions/checkout@v3

      - name: Init Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install tweepy google-generativeai requests beautifulsoup4

      - name: Execute Script
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py
