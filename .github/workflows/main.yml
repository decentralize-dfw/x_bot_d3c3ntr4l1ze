name: Decentralize Design Thinking on Automation

on:
  schedule:
    # 1. Sabah Tweeti: TR 09:00 -> UTC 06:00
    - cron: '0 6 * * *'
    # 2. Akşam Tweeti (viral): TR 18:00 -> UTC 15:00
    - cron: '0 15 * * *'
    # 3. Reply oturumları: TR 11:00 / 14:00 -> UTC 08:00 / 11:00
    - cron: '0 8 * * *'
    - cron: '0 11 * * *'
    # 4. Artwork tweeti: TR 23:00 -> UTC 20:00
    - cron: '0 20 * * *'
    # 5. TEST TWEETI: UTC 22:02 (geçici)
    - cron: '2 22 * * *'
  workflow_dispatch: # Manuel çalıştırma butonu her zaman açık

jobs:
  transmit:
    runs-on: ubuntu-latest

    steps:
      - name: Git Checkout
        uses: actions/checkout@v3

      - name: Init Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Determine Mode and Execute
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          HOUR=$(date -u +%H | sed 's/^0//')
          if [ "$HOUR" -ge 5 ] && [ "$HOUR" -le 7 ]; then
            echo "Mode: morning"
            python bot.py morning
          elif [ "$HOUR" -ge 15 ] && [ "$HOUR" -le 17 ]; then
            echo "Mode: evening (viral)"
            python bot.py evening
          elif [ "$HOUR" -eq 8 ] || [ "$HOUR" -eq 11 ]; then
            echo "Mode: reply"
            python bot.py reply
          elif [ "$HOUR" -eq 20 ]; then
            echo "Mode: artwork"
            python bot.py artwork
          else
            echo "Mode: test (evening)"
            python bot.py evening
          fi
