name: Decentralize Design Thinking on Automation

on:
  schedule:
    # TR 03:00 -> UTC 00:00  — Media archive tweet
    - cron: '0 0 * * *'
    # TR 06:00 -> UTC 03:00  — Decrypt.co news tweet
    - cron: '0 3 * * *'
    # TR 09:00 -> UTC 06:00  — Artwork drop
    - cron: '0 6 * * *'
    # TR 12:00 -> UTC 09:00  — VentureBeat news tweet
    - cron: '0 9 * * *'
    # TR 15:00 -> UTC 12:00  — Evening manifesto
    - cron: '0 12 * * *'
    # TR 18:00 -> UTC 15:00  — Controversial manifesto
    - cron: '0 15 * * *'
    # TR 21:00 -> UTC 18:00  — Evening manifesto
    - cron: '0 18 * * *'
    # TR 00:00 -> UTC 21:00  — Controversial manifesto
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Çalıştırılacak mod (boş bırakırsan schedule mantığına göre çalışır)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - decrypt
          - venturebeat
          - evening
          - evening_controversial
          - artwork
          - morning

jobs:
  transmit:
    runs-on: ubuntu-latest

    steps:
      - name: Git Checkout
        uses: actions/checkout@v3

      - name: Init Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Determine Mode and Execute
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SCHEDULE: ${{ github.event.schedule }}
          DISPATCH_MODE: ${{ github.event.inputs.mode }}
        run: |
          # Manuel dispatch'te mode input'u varsa onu kullan
          if [ -n "$DISPATCH_MODE" ]; then
            echo "Mode: manual dispatch override → $DISPATCH_MODE"
            python bot.py "$DISPATCH_MODE"
            exit 0
          fi
          echo "Triggered by schedule: '$SCHEDULE'"
          if [ "$SCHEDULE" = "0 0 * * *" ]; then
            echo "Mode: morning (media archive)"
            python bot.py morning
          elif [ "$SCHEDULE" = "0 3 * * *" ]; then
            echo "Mode: decrypt.co news tweet"
            python bot.py decrypt
          elif [ "$SCHEDULE" = "0 6 * * *" ]; then
            echo "Mode: artwork"
            python bot.py artwork
          elif [ "$SCHEDULE" = "0 9 * * *" ]; then
            echo "Mode: venturebeat.com news tweet"
            python bot.py venturebeat
          elif [ "$SCHEDULE" = "0 12 * * *" ]; then
            echo "Mode: evening (manifesto)"
            python bot.py evening
          elif [ "$SCHEDULE" = "0 15 * * *" ]; then
            echo "Mode: evening_controversial"
            python bot.py evening_controversial
          elif [ "$SCHEDULE" = "0 18 * * *" ]; then
            echo "Mode: evening (manifesto)"
            python bot.py evening
          elif [ "$SCHEDULE" = "0 21 * * *" ]; then
            echo "Mode: evening_controversial"
            python bot.py evening_controversial
          else
            echo "Mode: manual dispatch — running evening"
            python bot.py evening
          fi
