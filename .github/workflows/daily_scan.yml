name: Daily Niche Scan + Bilan (AŞAMA 1)

on:
  schedule:
    # Her gün 05:30 UTC — reply/quote/RT modlarından önce tarama tamamlansın
    - cron: '30 5 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install tweepy fpdf2

      - name: Run daily scan
        env:
          BEARERTOKEN: ${{ secrets.BEARERTOKEN }}
        run: python daily_scan.py

      - name: Run following scan (following_archive.json güncelle)
        continue-on-error: true
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          BEARERTOKEN: ${{ secrets.BEARERTOKEN }}
        run: python bot.py following_scan

      - name: Generate daily PDF report (bilan_quotidienne)
        run: python daily_report.py

      - name: Update BRAIN-WIP archive
        run: python brain_wip.py

      - name: Commit scan results + following archive + PDF report + BRAIN-WIP
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scan_results.json bilan_quotidienne/ brain_wip.json
          git add --ignore-unmatch following_archive.json
          git diff --staged --quiet && echo "No changes to commit." && exit 0
          git commit -m "scan: daily niche + following scan + bilan $(date -u +%Y-%m-%d)"
          git push origin ${{ github.ref_name }} || (
            git pull --rebase origin ${{ github.ref_name }} &&
            git push origin ${{ github.ref_name }}
          )
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
